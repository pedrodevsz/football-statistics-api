spring:
  config:
    import: "optional:dotenv:"
  application:
    name: collector

  datasource:
    url: ${DB_URL:jdbc:h2:mem:collector;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

match:
  update:
    fixed-delay: 6h
    initial-delay: 30s

server:
  port: ${PORT:8080}